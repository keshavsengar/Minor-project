{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'stud_login_style.css' %}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<form method="POST">
<div class="container">
    <div class="card">
        <h1>Login</h1>
        <p class="subtitle">Login to your account</p>
        
            {% csrf_token %}

            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="roll_number" placeholder="Roll number" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock left-icon"></i>
                <input type="password" id="password" name="password" placeholder="Password" required>
                <i class="fa-solid fa-eye right-icon" id="eyeIcon" onclick="togglePassword()"></i>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox" checked>
                    Keep me signed in
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit">Login</button>
<h5>______________________________ Or ______________________________</h5>
        <p class="switch">
            <a href="{% url 'mentor' %}">
                Don't have an account? <b>Contact to your mentor</b>
            </a>
        </p>
    </div>
</div>
</form>

<script>
function togglePassword() {
    const password = document.getElementById("password");
    const eye = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        eye.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        eye.classList.replace("fa-eye-slash", "fa-eye");
    }
}

</script>


</body>
</html>
