{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'stud_register_style.css' %}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
                   
<div class="container">
    <div class="card">
        <h1>Create New Account</h1>
        <p class="subtitle">Create account and explore the knowledge</p>

        <!-- IMPORTANT: form tag added -->
        <form method="post">
            {% csrf_token %}

            <!-- Student Name -->
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Student name" required>
            </div>

            <!-- Username -->
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <!-- Roll Number -->
            <div class="input-group">
                <i class="fa-solid fa-id-badge"></i>
                <input type="text" name="roll_number" placeholder="Roll Number" required>
            </div>

            <!-- Course -->
            <div class="input-group">
                <i class="fa-solid fa-book"></i>
                <input type="text" name="course" placeholder="Course" required>
            </div>

            <!-- Email -->
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="course_email" placeholder="Email" required>
            </div>

<!-- Password -->
        <div class="input-group">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fa-solid fa-eye right-icon" onclick="togglePassword('password', this)"></i>
        </div>

<!-- Confirm Password -->
        <div class="input-group">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            <i class="fa-solid fa-eye right-icon" onclick="togglePassword('confirm_password', this)"></i>
        </div>


            <button type="submit">Create Account</button>
        </form>
<h5>______________________ Or ______________________</h5>
        <p class="switch">
            <a href="{% url 'login' %}">
                Access already existing <b>Student</b>
            </a>
        </p>
    </div>
</div>

</form>

<script>
function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>


</body>
</html>
